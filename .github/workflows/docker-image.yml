name: Build and publish Docker image

# Builds the multi-arch (amd64 + arm64) container image from the repo
# Dockerfile and pushes it to Docker Hub on every v* tag push, so
# `docker pull <dockerhub-user>/breaknwipe` just works.
#
# Requires (set up once via docs/DOCKER.md "Maintainer setup", not by this
# workflow):
#   - repo secret DOCKERHUB_USERNAME: the Docker Hub account/namespace
#   - repo secret DOCKERHUB_TOKEN: a Docker Hub access token with
#     Read & Write scope for that account

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Docker Hub publish configuration
        id: publish_config
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [[ -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
            echo "can_push=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "::notice::Secrets DOCKERHUB_USERNAME and/or DOCKERHUB_TOKEN are not set; skipping Docker Hub publish for manual run."
            echo "can_push=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Secrets DOCKERHUB_USERNAME and/or DOCKERHUB_TOKEN are not set. Complete the maintainer setup in docs/DOCKER.md first."
            exit 1
          fi

      - name: Set up QEMU (for the arm64 build)
        if: steps.publish_config.outputs.can_push == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.publish_config.outputs.can_push == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.publish_config.outputs.can_push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        if: steps.publish_config.outputs.can_push == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/breaknwipe
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push (linux/amd64 + linux/arm64)
        if: steps.publish_config.outputs.can_push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
