<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BreakNWipe by CodeBreakers - Cleaning Progress</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <div class="page active" id="progressPage">
            <div class="header">
                <h1>⚫ BreakNWipe</h1>
                <p>by CodeBreakers - Securely wiping data from your device</p>
            </div>
            <div class="content">
                <div class="progress-header">
                    <h2>Cleaning <span class="device-name" id="selectedDeviceName">Device</span></h2>
                    <p><span class="status-indicator status-running"></span>Operation in progress...</p>
                </div>
                
                <div class="progress-container">
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                    </div>
                    <div style="text-align: center; margin-top: 15px; font-size: 1.2rem; font-weight: bold;">
                        <strong id="progressPercent">0%</strong> Complete
                    </div>
                </div>
                
                <div class="progress-stats">
                    <div class="stat-card">
                        <div class="circular-progress">
                            <svg>
                                <circle class="progress-circle" cx="40" cy="40" r="36"></circle>
                                <circle class="progress-fill" id="speedProgress" cx="40" cy="40" r="36"></circle>
                            </svg>
                        </div>
                        <div class="stat-value" id="cleaningSpeed">0 MB/s</div>
                        <div class="stat-label">Cleaning Speed</div>
                    </div>
                    <div class="stat-card">
                        <div class="circular-progress">
                            <svg>
                                <circle class="progress-circle" cx="40" cy="40" r="36"></circle>
                                <circle class="progress-fill" id="dataProgress" cx="40" cy="40" r="36"></circle>
                            </svg>
                        </div>
                        <div class="stat-value" id="dataProcessed">0 GB</div>
                        <div class="stat-label">Data Processed</div>
                    </div>
                    <div class="stat-card">
                        <div class="circular-progress">
                            <svg>
                                <circle class="progress-circle" cx="40" cy="40" r="36"></circle>
                                <circle class="progress-fill" id="timeElapsedProgress" cx="40" cy="40" r="36"></circle>
                            </svg>
                        </div>
                        <div class="stat-value" id="timeElapsed">00:00:00</div>
                        <div class="stat-label">Time Elapsed</div>
                    </div>
                    <div class="stat-card">
                        <div class="circular-progress">
                            <svg>
                                <circle class="progress-circle" cx="40" cy="40" r="36"></circle>
                                <circle class="progress-fill" id="etaProgress" cx="40" cy="40" r="36"></circle>
                            </svg>
                        </div>
                        <div class="stat-value" id="estimatedTime">--:--:--</div>
                        <div class="stat-label">ETA Remaining</div>
                    </div>
                    <div class="stat-card">
                        <div class="circular-progress">
                            <svg>
                                <circle class="progress-circle" cx="40" cy="40" r="36"></circle>
                                <circle class="progress-fill" id="securityProgress" cx="40" cy="40" r="36"></circle>
                            </svg>
                        </div>
                        <div class="stat-value" id="securityLevel">DoD</div>
                        <div class="stat-label">Security Level</div>
                    </div>
                    <div class="stat-card">
                        <div class="circular-progress">
                            <svg>
                                <circle class="progress-circle" cx="40" cy="40" r="36"></circle>
                                <circle class="progress-fill" id="passProgress" cx="40" cy="40" r="36"></circle>
                            </svg>
                        </div>
                        <div class="stat-value" id="currentPass">1/3</div>
                        <div class="stat-label">Current Pass</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let websocket = null;
        let sessionId = null;
        let selectedDevice = null;
        let selectedAlgorithm = null;
        let currentProgress = 0;
        let startTime = null;
        let timeElapsedInterval = null;

        // Time formatting function
        function formatTime(seconds) {
            if (!seconds || seconds < 0) return '--:--:--';

            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);

            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Start time elapsed counter
        function startTimeElapsedCounter() {
            startTime = Date.now();
            timeElapsedInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                document.getElementById('timeElapsed').textContent = formatTime(elapsed);

                // Update time elapsed circular progress (based on a reasonable max time, e.g., 3 hours = 10800 seconds)
                const maxTime = 10800; // 3 hours
                const timeProgress = Math.min(100, (elapsed / maxTime) * 100);
                updateCircularProgress('timeElapsedProgress', timeProgress);
            }, 1000);
        }

        // Stop time elapsed counter
        function stopTimeElapsedCounter() {
            if (timeElapsedInterval) {
                clearInterval(timeElapsedInterval);
                timeElapsedInterval = null;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            sessionId = sessionStorage.getItem('sessionId');
            selectedDevice = JSON.parse(sessionStorage.getItem('selectedDevice'));
            selectedAlgorithm = sessionStorage.getItem('selectedAlgorithm');

            if (!sessionId || !selectedDevice) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('selectedDeviceName').textContent = selectedDevice.model;

            // Map algorithm to display name
            const algorithmMap = {
                'nist-clear': 'NIST Clear (1-Pass)',
                'nist-purge': 'NIST Purge (3-Pass)',
                'dod-3pass': 'DoD 3-Pass (3-Pass)',
                'dod-7pass': 'DoD 7-Pass (7-Pass)',
                'gutmann': 'Gutmann Method (35-Pass)',
                'random': 'Random Data (3-Pass)',
                'zeros': 'Zero Fill (1-Pass)',
                'custom': 'Custom Algorithm (3-Pass)'
            };

            document.getElementById('securityLevel').textContent = algorithmMap[selectedAlgorithm] || 'Unknown';

            connectWebSocket();
            animateStatCards();
        });

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/${sessionId}`;

            websocket = new WebSocket(wsUrl);

            websocket.onopen = () => {
                console.log('WebSocket connected');
            };

            websocket.onmessage = (event) => {
                const message = JSON.parse(event.data);
                if (message.type === 'progress_update') {
                    updateProgress(message.data);
                }
            };

            websocket.onclose = () => {
                console.log('WebSocket disconnected');
                // Try to reconnect after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };

            websocket.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        function updateProgress(data) {
            currentProgress = data.progress_percent;

            // Start timer on first progress update
            if (!startTime && data.status === 'running') {
                startTimeElapsedCounter();
            }

            // Update progress bar
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');

            progressBar.style.width = currentProgress + '%';
            progressPercent.textContent = Math.round(currentProgress) + '%';

            // Update cleaning speed
            document.getElementById('cleaningSpeed').textContent = data.speed_mbps.toFixed(1) + ' MB/s';

            // Update speed circular progress (normalize to 0-100 range, assuming max 100 MB/s)
            const speedProgress = Math.min(100, (data.speed_mbps / 100) * 100);
            updateCircularProgress('speedProgress', speedProgress);

            // Update data processed
            const processedGB = (data.data_processed / (1024 * 1024 * 1024)).toFixed(1);
            document.getElementById('dataProcessed').textContent = processedGB + ' GB';

            // Update data circular progress
            updateCircularProgress('dataProgress', currentProgress);

            // Update current pass
            document.getElementById('currentPass').textContent = `${data.current_pass}/${data.total_passes}`;

            // Update pass circular progress
            const passProgress = data.total_passes > 0 ? ((data.current_pass - 1) / (data.total_passes - 1)) * 100 : 0;
            updateCircularProgress('passProgress', Math.min(100, passProgress));

            // Security level progress (gradually increases with overall progress)
            const securityProgress = Math.min(100, currentProgress);
            updateCircularProgress('securityProgress', securityProgress);

            // Update ETA if available
            if (data.estimated_remaining && data.estimated_remaining > 0) {
                document.getElementById('estimatedTime').textContent = formatTime(data.estimated_remaining);

                // Update ETA circular progress (inverse of remaining time progress)
                const maxEstimatedTime = 10800; // 3 hours max
                const etaProgress = Math.max(0, 100 - ((data.estimated_remaining / maxEstimatedTime) * 100));
                updateCircularProgress('etaProgress', etaProgress);
            } else if (currentProgress > 0) {
                // Calculate ETA based on elapsed time and progress
                if (startTime) {
                    const elapsed = (Date.now() - startTime) / 1000;
                    const estimatedTotal = (elapsed / currentProgress) * 100;
                    const estimatedRemaining = estimatedTotal - elapsed;

                    if (estimatedRemaining > 0) {
                        document.getElementById('estimatedTime').textContent = formatTime(estimatedRemaining);

                        const maxEstimatedTime = 10800; // 3 hours max
                        const etaProgress = Math.max(0, 100 - ((estimatedRemaining / maxEstimatedTime) * 100));
                        updateCircularProgress('etaProgress', etaProgress);
                    }
                }
            }

            // Update status based on progress data
            updateStatus(data.status);
        }

        function updateStatus(status) {
            const statusIndicator = document.querySelector('.status-indicator');
            const statusText = statusIndicator.parentElement;

            switch (status) {
                case 'running':
                    statusIndicator.className = 'status-indicator status-running';
                    statusText.innerHTML = '<span class="status-indicator status-running"></span>Operation in progress...';
                    break;
                case 'completed':
                    statusIndicator.className = 'status-indicator status-complete';
                    statusText.innerHTML = '<span class="status-indicator status-complete"></span>Operation completed successfully!';

                    // Stop timer and complete all progress indicators
                    stopTimeElapsedCounter();
                    updateCircularProgress('speedProgress', 100);
                    updateCircularProgress('dataProgress', 100);
                    updateCircularProgress('securityProgress', 100);
                    updateCircularProgress('passProgress', 100);
                    updateCircularProgress('timeElapsedProgress', 100);
                    updateCircularProgress('etaProgress', 100);

                    // Set final ETA to 00:00:00
                    document.getElementById('estimatedTime').textContent = '00:00:00';

                    // Save completion data and redirect
                    const completionData = {
                        device: selectedDevice.model,
                        deviceType: selectedDevice.device_type,
                        totalSize: selectedDevice.capacity_human,
                        dataCleaned: document.getElementById('dataProcessed').textContent,
                        completedAt: new Date().toISOString(),
                        method: document.getElementById('securityLevel').textContent,
                        status: 'Success',
                        reportId: 'DW-' + new Date().getFullYear() + '-' + Math.random().toString().substr(2, 6)
                    };

                    sessionStorage.setItem('completionData', JSON.stringify(completionData));

                    setTimeout(() => {
                        window.location.href = 'qr-report.html';
                    }, 3000);
                    break;
                case 'failed':
                    statusIndicator.className = 'status-indicator status-error';
                    statusText.innerHTML = '<span class="status-indicator status-error"></span>Operation failed!';
                    break;
                case 'cancelled':
                    statusIndicator.className = 'status-indicator status-error';
                    statusText.innerHTML = '<span class="status-indicator status-error"></span>Operation cancelled!';
                    break;
            }
        }

        function updateCircularProgress(elementId, progress) {
            const progressElement = document.getElementById(elementId);
            if (progressElement) {
                const circumference = 226;
                const offset = circumference - (progress / 100) * circumference;
                progressElement.style.strokeDashoffset = offset;
            }
        }

        function animateStatCards() {
            setTimeout(() => {
                const statCards = document.querySelectorAll('.stat-card');
                statCards.forEach((card, index) => {
                    card.style.opacity = '0';
                    card.style.transform = 'translateY(30px)';
                    setTimeout(() => {
                        card.style.transition = 'all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(0)';
                    }, index * 150);
                });
            }, 500);
        }

        // Clean up WebSocket when page unloads
        window.addEventListener('beforeunload', () => {
            if (websocket) {
                websocket.close();
            }
        });
    </script>
</body>
</html>
