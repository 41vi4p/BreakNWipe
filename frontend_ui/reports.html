<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BreakNWipe by CodeBreakers - Wipe Reports</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .reports-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-button {
            background: linear-gradient(145deg, #2d3748, #1a202c);
            border: 1px solid #4a5568;
            color: #e2e8f0;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-button:hover {
            background: linear-gradient(145deg, #4a5568, #2d3748);
            border-color: #63b3ed;
            color: #fff;
        }

        .reports-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .report-card {
            background: linear-gradient(145deg, #2d3748, #1a202c);
            border: 1px solid #4a5568;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .report-card:hover {
            border-color: #63b3ed;
            box-shadow: 0 4px 20px rgba(99, 179, 237, 0.2);
            transform: translateY(-2px);
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .report-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .status-completed {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
            border: 1px solid #48bb78;
        }

        .status-failed {
            background: rgba(245, 101, 101, 0.2);
            color: #f56565;
            border: 1px solid #f56565;
        }

        .report-info {
            margin-bottom: 15px;
        }

        .report-info h3 {
            color: #e2e8f0;
            margin: 0 0 8px 0;
            font-size: 1.1em;
        }

        .report-info p {
            color: #a0aec0;
            margin: 4px 0;
            font-size: 0.9em;
        }

        .report-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-button {
            padding: 6px 12px;
            background: linear-gradient(145deg, #4a5568, #2d3748);
            border: 1px solid #63b3ed;
            color: #63b3ed;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85em;
            transition: all 0.3s ease;
        }

        .action-button:hover {
            background: linear-gradient(145deg, #63b3ed, #3182ce);
            color: #fff;
        }

        .action-button.disabled {
            background: #4a5568;
            border-color: #718096;
            color: #718096;
            cursor: not-allowed;
        }

        .filters {
            background: linear-gradient(145deg, #2d3748, #1a202c);
            border: 1px solid #4a5568;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .filter-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            color: #e2e8f0;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .filter-group input, .filter-group select {
            background: #1a202c;
            border: 1px solid #4a5568;
            color: #e2e8f0;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .filter-group input:focus, .filter-group select:focus {
            outline: none;
            border-color: #63b3ed;
        }

        .filter-button {
            background: linear-gradient(145deg, #63b3ed, #3182ce);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .filter-button:hover {
            background: linear-gradient(145deg, #3182ce, #2c5282);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0aec0;
        }

        .empty-state .icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
        }

        .modal-content {
            background: linear-gradient(145deg, #2d3748, #1a202c);
            margin: 5% auto;
            padding: 30px;
            border: 1px solid #4a5568;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #4a5568;
        }

        .modal-header h2 {
            color: #e2e8f0;
            margin: 0;
        }

        .close {
            color: #a0aec0;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }

        .close:hover {
            color: #e2e8f0;
        }

        .report-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .detail-section {
            background: #1a202c;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #4a5568;
        }

        .detail-section h3 {
            color: #63b3ed;
            margin: 0 0 10px 0;
            font-size: 1em;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding-bottom: 4px;
        }

        .detail-item:not(:last-child) {
            border-bottom: 1px solid #2d3748;
        }

        .detail-label {
            color: #a0aec0;
            font-weight: 500;
        }

        .detail-value {
            color: #e2e8f0;
            text-align: right;
        }

        .qr-section {
            text-align: center;
            margin: 20px 0;
        }

        .qr-code {
            max-width: 200px;
            height: auto;
            border: 1px solid #4a5568;
            border-radius: 8px;
        }

        .download-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .download-button {
            padding: 12px 24px;
            background: linear-gradient(145deg, #38b2ac, #319795);
            border: none;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .download-button:hover {
            background: linear-gradient(145deg, #319795, #2c7a7b);
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .reports-header {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
            }

            .filter-row {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .reports-grid {
                grid-template-columns: 1fr;
            }

            .report-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="reports-header">
            <div class="header">
                <h1>⚫ BreakNWipe Reports</h1>
                <p>by CodeBreakers - Generated Certificates & QR Codes</p>
            </div>
            <div class="nav-buttons">
                <a href="/index.html" class="nav-button">🏠 Home</a>
                <a href="/logs.html" class="nav-button">📋 Logs</a>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-row">
                <div class="filter-group">
                    <label for="deviceFilter">Filter by Device:</label>
                    <select id="deviceFilter">
                        <option value="">All Devices</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="searchFilter">Search Reports:</label>
                    <input type="text" id="searchFilter" placeholder="Search by model, serial, or algorithm...">
                </div>
                <button class="filter-button" onclick="applyFilters()">🔍 Filter</button>
            </div>
        </div>

        <!-- Reports Grid -->
        <div class="reports-grid" id="reportsGrid">
            <div class="empty-state">
                <div class="icon">⏳</div>
                <h3>Loading Reports...</h3>
                <p>Please wait while we fetch your wipe reports.</p>
            </div>
        </div>
    </div>

    <!-- Report Details Modal -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Report Details</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalBody">
                <!-- Report details will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        let allReports = [];
        let availableDevices = [];

        // Load reports on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadReports();
            loadDeviceFilter();
        });

        async function loadReports() {
            try {
                const response = await fetch('/api/reports');
                if (response.ok) {
                    allReports = await response.json();
                    displayReports(allReports);
                } else {
                    throw new Error('Failed to load reports');
                }
            } catch (error) {
                console.error('Error loading reports:', error);
                showError('Failed to load reports. Please try again.');
            }
        }

        async function loadDeviceFilter() {
            try {
                const response = await fetch('/api/reports');
                if (response.ok) {
                    const reports = await response.json();
                    const devices = [...new Set(reports.map(r => r.device_path))];
                    const deviceFilter = document.getElementById('deviceFilter');

                    devices.forEach(device => {
                        const option = document.createElement('option');
                        option.value = device;
                        option.textContent = device;
                        deviceFilter.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading device filter:', error);
            }
        }

        function displayReports(reports) {
            const grid = document.getElementById('reportsGrid');

            if (reports.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📄</div>
                        <h3>No Reports Found</h3>
                        <p>No wipe reports have been generated yet. Complete a wipe operation to see reports here.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = reports.map(report => {
                const statusClass = report.success ? 'status-completed' : 'status-failed';
                const statusText = report.success ? 'Completed' : 'Failed';
                const createdDate = new Date(report.created_at).toLocaleDateString();
                const createdTime = new Date(report.created_at).toLocaleTimeString();

                return `
                    <div class="report-card" onclick="viewReport('${report.session_id}')">
                        <div class="report-header">
                            <div class="report-status ${statusClass}">${statusText}</div>
                        </div>
                        <div class="report-info">
                            <h3>${report.device_model || 'Unknown Device'}</h3>
                            <p><strong>Path:</strong> ${report.device_path}</p>
                            <p><strong>Serial:</strong> ${report.device_serial || 'N/A'}</p>
                            <p><strong>Algorithm:</strong> ${report.algorithm_used || 'N/A'}</p>
                            <p><strong>Report ID:</strong> ${report.report_id}</p>
                            <p><strong>Date:</strong> ${createdDate} ${createdTime}</p>
                            ${report.total_bytes_written ? `<p><strong>Data Processed:</strong> ${formatBytes(report.total_bytes_written)}</p>` : ''}
                        </div>
                        <div class="report-actions">
                            ${report.certificate_pdf_path ? `<a href="#" class="action-button" onclick="event.stopPropagation(); downloadFile('${report.certificate_pdf_path}', 'certificate')">📄 PDF</a>` : '<span class="action-button disabled">📄 PDF</span>'}
                            ${report.qr_code_image_path ? `<a href="#" class="action-button" onclick="event.stopPropagation(); downloadFile('${report.qr_code_image_path}', 'qr')">🔲 QR Code</a>` : '<span class="action-button disabled">🔲 QR Code</span>'}
                            ${report.certificate_json_path ? `<a href="#" class="action-button" onclick="event.stopPropagation(); downloadFile('${report.certificate_json_path}', 'json')">📋 JSON</a>` : '<span class="action-button disabled">📋 JSON</span>'}
                            <a href="#" class="action-button" onclick="event.stopPropagation(); viewReport('${report.session_id}')">👁 Details</a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function viewReport(sessionId) {
            try {
                const response = await fetch(`/api/reports/${sessionId}`);
                if (response.ok) {
                    const report = await response.json();
                    showReportDetails(report);
                } else {
                    throw new Error('Failed to load report details');
                }
            } catch (error) {
                console.error('Error loading report details:', error);
                showError('Failed to load report details.');
            }
        }

        function showReportDetails(report) {
            const modal = document.getElementById('reportModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');

            modalTitle.textContent = `Report: ${report.report_id}`;

            const createdDate = new Date(report.created_at).toLocaleString();
            const duration = report.start_time && report.end_time ?
                Math.round((new Date(report.end_time) - new Date(report.start_time)) / 1000) : 0;

            modalBody.innerHTML = `
                <div class="report-details">
                    <div class="detail-section">
                        <h3>Device Information</h3>
                        <div class="detail-item">
                            <span class="detail-label">Path:</span>
                            <span class="detail-value">${report.device_path}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Model:</span>
                            <span class="detail-value">${report.device_model || 'N/A'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Serial:</span>
                            <span class="detail-value">${report.device_serial || 'N/A'}</span>
                        </div>
                        ${report.total_bytes_written ? `
                        <div class="detail-item">
                            <span class="detail-label">Capacity:</span>
                            <span class="detail-value">${formatBytes(report.total_bytes_written)}</span>
                        </div>
                        ` : ''}
                    </div>

                    <div class="detail-section">
                        <h3>Wipe Operation</h3>
                        <div class="detail-item">
                            <span class="detail-label">Algorithm:</span>
                            <span class="detail-value">${report.algorithm_used || 'N/A'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Method:</span>
                            <span class="detail-value">${report.wipe_method || 'Software'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Passes:</span>
                            <span class="detail-value">${report.total_passes || 'N/A'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Status:</span>
                            <span class="detail-value ${report.success ? 'status-completed' : 'status-failed'}">${report.success ? 'Completed' : 'Failed'}</span>
                        </div>
                        ${report.average_speed_mbps ? `
                        <div class="detail-item">
                            <span class="detail-label">Avg Speed:</span>
                            <span class="detail-value">${report.average_speed_mbps.toFixed(2)} MB/s</span>
                        </div>
                        ` : ''}
                    </div>

                    <div class="detail-section">
                        <h3>Certificate Details</h3>
                        <div class="detail-item">
                            <span class="detail-label">Organization:</span>
                            <span class="detail-value">${report.organization}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Operator:</span>
                            <span class="detail-value">${report.operator}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Standards:</span>
                            <span class="detail-value">${report.compliance_standards}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Generated:</span>
                            <span class="detail-value">${createdDate}</span>
                        </div>
                        ${duration > 0 ? `
                        <div class="detail-item">
                            <span class="detail-label">Duration:</span>
                            <span class="detail-value">${formatDuration(duration)}</span>
                        </div>
                        ` : ''}
                    </div>

                    ${report.verification_hash ? `
                    <div class="detail-section">
                        <h3>Verification</h3>
                        <div class="detail-item">
                            <span class="detail-label">Hash:</span>
                            <span class="detail-value" style="font-family: monospace; font-size: 0.8em;">${report.verification_hash}</span>
                        </div>
                    </div>
                    ` : ''}
                </div>

                ${report.qr_code_image_path ? `
                <div class="qr-section">
                    <h3>QR Code</h3>
                    <img src="${report.qr_code_image_path}" alt="QR Code" class="qr-code" onerror="this.style.display='none'">
                </div>
                ` : ''}

                <div class="download-buttons">
                    ${report.certificate_pdf_path ? `<a href="#" class="download-button" onclick="downloadFile('${report.certificate_pdf_path}', 'certificate')">📄 Download PDF Certificate</a>` : ''}
                    ${report.qr_code_image_path ? `<a href="#" class="download-button" onclick="downloadFile('${report.qr_code_image_path}', 'qr')">🔲 Download QR Code</a>` : ''}
                    ${report.certificate_json_path ? `<a href="#" class="download-button" onclick="downloadFile('${report.certificate_json_path}', 'json')">📋 Download JSON Data</a>` : ''}
                </div>
            `;

            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('reportModal').style.display = 'none';
        }

        function applyFilters() {
            const deviceFilter = document.getElementById('deviceFilter').value;
            const searchFilter = document.getElementById('searchFilter').value.toLowerCase();

            let filteredReports = allReports;

            if (deviceFilter) {
                filteredReports = filteredReports.filter(report => report.device_path === deviceFilter);
            }

            if (searchFilter) {
                filteredReports = filteredReports.filter(report =>
                    (report.device_model || '').toLowerCase().includes(searchFilter) ||
                    (report.device_serial || '').toLowerCase().includes(searchFilter) ||
                    (report.algorithm_used || '').toLowerCase().includes(searchFilter) ||
                    (report.report_id || '').toLowerCase().includes(searchFilter)
                );
            }

            displayReports(filteredReports);
        }

        async function downloadFile(filePath, type) {
            try {
                const response = await fetch(`/api/download${filePath}`);
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filePath.split('/').pop();
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                } else {
                    throw new Error('File download failed');
                }
            } catch (error) {
                console.error('Download error:', error);
                showError('Failed to download file. File may not exist.');
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatDuration(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;

            if (hours > 0) {
                return `${hours}h ${minutes}m ${secs}s`;
            } else if (minutes > 0) {
                return `${minutes}m ${secs}s`;
            } else {
                return `${secs}s`;
            }
        }

        function showError(message) {
            const grid = document.getElementById('reportsGrid');
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="icon">❌</div>
                    <h3>Error</h3>
                    <p>${message}</p>
                </div>
            `;
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('reportModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Add keyboard support for modal
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
