<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BreakNWipe by CodeBreakers - Operation Logs</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .logs-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .filters-section {
            background: rgba(45,45,45,0.6);
            border: 2px solid rgba(85,85,85,0.7);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .filter-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .filter-group input, .filter-group select {
            padding: 10px;
            border: 1px solid var(--border-gray);
            border-radius: 5px;
            background: var(--bg-dark);
            color: var(--primary-white);
        }

        .filter-group button {
            padding: 10px 20px;
            background: var(--primary-cyan);
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(45,45,45,0.6);
            border: 2px solid rgba(85,85,85,0.7);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-cyan);
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        .logs-table {
            background: rgba(45,45,45,0.6);
            border: 2px solid rgba(85,85,85,0.7);
            border-radius: 15px;
            overflow: hidden;
        }

        .table-header {
            background: rgba(30,30,30,0.8);
            padding: 20px;
            border-bottom: 1px solid rgba(85,85,85,0.7);
        }

        .logs-grid {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr 1fr 1fr 1fr;
            gap: 15px;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(85,85,85,0.3);
            transition: background-color 0.2s ease;
        }

        .logs-grid:hover {
            background: rgba(85,85,85,0.2);
        }

        .logs-grid.header {
            background: rgba(30,30,30,0.8);
            font-weight: bold;
            color: var(--primary-white);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-align: center;
        }

        .status-completed { background: #4ecdc4; color: white; }
        .status-failed { background: #e74c3c; color: white; }
        .status-cancelled { background: #f39c12; color: white; }
        .status-running { background: #3498db; color: white; }
        .status-pending { background: #95a5a6; color: white; }

        .device-link {
            color: var(--primary-cyan);
            text-decoration: none;
            cursor: pointer;
        }

        .device-link:hover {
            text-decoration: underline;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 8px 16px;
            border: 1px solid var(--border-gray);
            background: var(--bg-dark);
            color: var(--primary-white);
            border-radius: 5px;
            cursor: pointer;
        }

        .pagination button:hover {
            background: var(--primary-cyan);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .device-details {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .device-details-content {
            background: var(--bg-dark);
            border: 2px solid rgba(85,85,85,0.7);
            border-radius: 15px;
            padding: 30px;
            max-width: 80%;
            max-height: 80%;
            overflow-y: auto;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: var(--primary-white);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-gray);
        }

        .no-logs {
            text-align: center;
            padding: 40px;
            color: var(--text-gray);
        }

        @media (max-width: 768px) {
            .logs-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .logs-grid .logs-grid-item {
                display: flex;
                justify-content: space-between;
            }

            .filter-group {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page active">
            <div class="header">
                <h1>⚫ BreakNWipe</h1>
                <p>by CodeBreakers - Operation Logs & History</p>
                <div style="margin-top: 15px;">
                    <button class="btn btn-secondary" onclick="goHome()" style="margin-right: 10px;">
                        🏠 Home
                    </button>
                    <button class="btn btn-secondary" onclick="refreshLogs()">
                        🔄 Refresh
                    </button>
                </div>
            </div>

            <div class="logs-container">
                <!-- Statistics Section -->
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalOperations">-</div>
                        <div class="stat-label">Total Operations</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="successRate">-</div>
                        <div class="stat-label">Success Rate</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalDevices">-</div>
                        <div class="stat-label">Devices Processed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="avgDuration">-</div>
                        <div class="stat-label">Avg Duration</div>
                    </div>
                </div>

                <!-- Filters Section -->
                <div class="filters-section">
                    <h3 style="color: var(--primary-white); margin-bottom: 15px;">Filter & Search</h3>
                    <div class="filter-group">
                        <input type="text" id="searchInput" placeholder="Search by device, model, or algorithm...">
                        <select id="statusFilter">
                            <option value="">All Statuses</option>
                            <option value="completed">Completed</option>
                            <option value="failed">Failed</option>
                            <option value="cancelled">Cancelled</option>
                            <option value="running">Running</option>
                            <option value="pending">Pending</option>
                        </select>
                        <input type="text" id="deviceFilter" placeholder="Filter by device path...">
                        <button onclick="applyFilters()">Apply Filters</button>
                        <button onclick="clearFilters()">Clear</button>
                    </div>
                </div>

                <!-- Logs Table -->
                <div class="logs-table">
                    <div class="table-header">
                        <h3 style="color: var(--primary-white); margin: 0;">Operation History</h3>
                    </div>

                    <div class="logs-grid header">
                        <div>Date/Time</div>
                        <div>Device</div>
                        <div>Algorithm</div>
                        <div>Duration</div>
                        <div>Data Processed</div>
                        <div>Status</div>
                    </div>

                    <div id="logsContainer">
                        <div class="loading">
                            <div style="font-size: 2em; margin-bottom: 10px;">⏳</div>
                            <p>Loading operation logs...</p>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination" style="display: none;">
                    <button id="prevBtn" onclick="changePage(-1)">← Previous</button>
                    <span id="pageInfo">Page 1 of 1</span>
                    <button id="nextBtn" onclick="changePage(1)">Next →</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Device Details Modal -->
    <div class="device-details" id="deviceDetailsModal">
        <div class="device-details-content">
            <button class="close-btn" onclick="closeDeviceDetails()">×</button>
            <div id="deviceDetailsContent">
                <!-- Device details will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let totalPages = 1;
        let currentFilters = {};
        let allLogs = [];

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            loadStatistics();
            loadLogs();
        });

        // Load statistics
        async function loadStatistics() {
            try {
                const response = await fetch('/api/logs/statistics');
                if (response.ok) {
                    const data = await response.json();
                    displayStatistics(data.data);
                }
            } catch (error) {
                console.error('Error loading statistics:', error);
            }
        }

        // Display statistics
        function displayStatistics(stats) {
            document.getElementById('totalOperations').textContent = stats.total_operations || '0';
            document.getElementById('successRate').textContent =
                stats.success_rate ? `${stats.success_rate.toFixed(1)}%` : '0%';
            document.getElementById('totalDevices').textContent = stats.total_devices || '0';
            document.getElementById('avgDuration').textContent =
                stats.average_duration_seconds ? formatDuration(stats.average_duration_seconds) : '0m';
        }

        // Load logs
        async function loadLogs() {
            try {
                const params = new URLSearchParams();

                if (currentFilters.search) params.append('search', currentFilters.search);
                if (currentFilters.status) params.append('status', currentFilters.status);
                if (currentFilters.device) params.append('device_path', currentFilters.device);

                params.append('limit', '50');
                params.append('offset', String((currentPage - 1) * 50));

                const response = await fetch(`/api/logs?${params.toString()}`);
                if (response.ok) {
                    const data = await response.json();
                    allLogs = data.data;
                    displayLogs(allLogs);
                    updatePagination();
                } else {
                    throw new Error('Failed to load logs');
                }
            } catch (error) {
                console.error('Error loading logs:', error);
                document.getElementById('logsContainer').innerHTML = `
                    <div class="no-logs">
                        <div style="font-size: 2em; margin-bottom: 10px;">⚠️</div>
                        <p>Failed to load logs: ${error.message}</p>
                    </div>
                `;
            }
        }

        // Display logs
        function displayLogs(logs) {
            const container = document.getElementById('logsContainer');

            if (logs.length === 0) {
                container.innerHTML = `
                    <div class="no-logs">
                        <div style="font-size: 2em; margin-bottom: 10px;">📭</div>
                        <p>No operation logs found matching your criteria.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = logs.map(log => `
                <div class="logs-grid">
                    <div>${formatDateTime(log.created_at)}</div>
                    <div>
                        <div class="device-link" onclick="showDeviceDetails('${log.device_path}')">
                            ${log.device_model || 'Unknown Model'}
                        </div>
                        <div style="font-size: 0.8rem; color: var(--text-gray);">
                            ${log.device_path}
                        </div>
                    </div>
                    <div>${log.algorithm_used || 'Unknown'}</div>
                    <div>${formatDuration(log.duration_seconds)}</div>
                    <div>${formatBytes(log.data_processed_bytes)}</div>
                    <div>
                        <span class="status-badge status-${log.operation_status}">
                            ${formatStatus(log.operation_status)}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        // Show device details
        async function showDeviceDetails(devicePath) {
            try {
                const modal = document.getElementById('deviceDetailsModal');
                const content = document.getElementById('deviceDetailsContent');

                content.innerHTML = '<div class="loading">Loading device details...</div>';
                modal.style.display = 'flex';

                // Load device logs
                const response = await fetch(`/api/logs/device/${encodeURIComponent(devicePath)}`);
                if (response.ok) {
                    const data = await response.json();
                    displayDeviceDetails(devicePath, data.data);
                } else {
                    throw new Error('Failed to load device details');
                }
            } catch (error) {
                document.getElementById('deviceDetailsContent').innerHTML = `
                    <div class="no-logs">Error loading device details: ${error.message}</div>
                `;
            }
        }

        // Display device details
        function displayDeviceDetails(devicePath, logs) {
            const content = document.getElementById('deviceDetailsContent');

            if (logs.length === 0) {
                content.innerHTML = `
                    <h3>Device History: ${devicePath}</h3>
                    <p>No operations found for this device.</p>
                `;
                return;
            }

            const latestLog = logs[0];
            const totalOperations = logs.length;
            const completedOps = logs.filter(log => log.operation_status === 'completed').length;
            const totalDataProcessed = logs.reduce((sum, log) => sum + (log.data_processed_bytes || 0), 0);

            content.innerHTML = `
                <h3>Device History</h3>
                <div style="margin-bottom: 20px;">
                    <p><strong>Device Path:</strong> ${devicePath}</p>
                    <p><strong>Model:</strong> ${latestLog.device_model || 'Unknown'}</p>
                    <p><strong>Serial:</strong> ${latestLog.device_serial || 'Unknown'}</p>
                    <p><strong>Capacity:</strong> ${latestLog.device_capacity_human || 'Unknown'}</p>
                    <p><strong>Interface:</strong> ${latestLog.device_interface || 'Unknown'}</p>
                </div>

                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px;">
                    <div class="stat-card">
                        <div class="stat-value">${totalOperations}</div>
                        <div class="stat-label">Total Operations</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${completedOps}</div>
                        <div class="stat-label">Completed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${formatBytes(totalDataProcessed)}</div>
                        <div class="stat-label">Data Processed</div>
                    </div>
                </div>

                <h4>Operation History</h4>
                <div style="max-height: 300px; overflow-y: auto;">
                    ${logs.map(log => `
                        <div style="border: 1px solid var(--border-gray); border-radius: 5px; padding: 15px; margin-bottom: 10px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                                <strong>${formatDateTime(log.created_at)}</strong>
                                <span class="status-badge status-${log.operation_status}">
                                    ${formatStatus(log.operation_status)}
                                </span>
                            </div>
                            <p><strong>Algorithm:</strong> ${log.algorithm_used}</p>
                            <p><strong>Duration:</strong> ${formatDuration(log.duration_seconds)}</p>
                            <p><strong>Data Processed:</strong> ${formatBytes(log.data_processed_bytes)}</p>
                            ${log.error_message ? `<p style="color: #e74c3c;"><strong>Error:</strong> ${log.error_message}</p>` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Close device details modal
        function closeDeviceDetails() {
            document.getElementById('deviceDetailsModal').style.display = 'none';
        }

        // Apply filters
        function applyFilters() {
            currentFilters = {
                search: document.getElementById('searchInput').value.trim(),
                status: document.getElementById('statusFilter').value,
                device: document.getElementById('deviceFilter').value.trim()
            };
            currentPage = 1;
            loadLogs();
        }

        // Clear filters
        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('statusFilter').value = '';
            document.getElementById('deviceFilter').value = '';
            currentFilters = {};
            currentPage = 1;
            loadLogs();
        }

        // Change page
        function changePage(direction) {
            const newPage = currentPage + direction;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                loadLogs();
            }
        }

        // Update pagination
        function updatePagination() {
            const pagination = document.getElementById('pagination');
            const pageInfo = document.getElementById('pageInfo');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            if (allLogs.length > 0) {
                pagination.style.display = 'flex';
                totalPages = Math.max(1, Math.ceil(allLogs.length / 50));
                pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = currentPage === totalPages;
            } else {
                pagination.style.display = 'none';
            }
        }

        // Refresh logs
        function refreshLogs() {
            loadStatistics();
            loadLogs();
        }

        // Go home
        function goHome() {
            window.location.href = 'index.html';
        }

        // Utility functions
        function formatDateTime(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleString();
        }

        function formatDuration(seconds) {
            if (!seconds || seconds <= 0) return '0s';

            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;

            if (hours > 0) {
                return `${hours}h ${minutes}m`;
            } else if (minutes > 0) {
                return `${minutes}m ${secs}s`;
            } else {
                return `${secs}s`;
            }
        }

        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return `${(bytes / Math.pow(1024, i)).toFixed(1)} ${sizes[i]}`;
        }

        function formatStatus(status) {
            const statusMap = {
                'completed': 'Completed',
                'failed': 'Failed',
                'cancelled': 'Cancelled',
                'running': 'Running',
                'pending': 'Pending'
            };
            return statusMap[status] || status;
        }

        // Search on Enter key
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                applyFilters();
            }
        });

        // Close modal on outside click
        document.getElementById('deviceDetailsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDeviceDetails();
            }
        });
    </script>
</body>
</html>
